<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css"
      integrity="sha512-1sCRPdkRXhBV2PBLUdRb4tMg1w2YPf37qatUFeS7zlBy7jJI8Lf4VHwWfZZfpXtYSLy85pkm9GaYVYMfw5BC1A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    
    <title>Recipes of the World</title>
</head>
<body>
    <header>
        <h1 class="center padding">Recipes of the World</h1>
        <p class="credit">Photo by Brooke Lark on Unsplash</p>
    </header>
    
    <section>
        <h2 class="center padding">Share Your Favorite Recipe</h2>
        <div class="small-row">
            <div id="no-recipes">You have no recipes</div>
        </div>
        <div class="container">
            <div class="column col-1">
                <form method="POST">
                    <div class="row">
                        <label class="label" for="name">Name</label>
                        <input id="name" class="input" type="text" name="name" placeholder="Enter name here">
                    </div>
                    <div class="row">
                        <label class="label" for="Country">Country</label>
                        <select id="country" class="input" name="country">
                            <option value="" disabled selected>Select your country</option>
                        </select>
                    </div>
                    <!-- <div class="row">
                        <label class="label" for="type">Type</label>
                        <input id="type" class="input" type="text" name="type" placeholder="Type of food: main dish, decert ... ">
                    </div> -->

                    <div class="row"> 
                        <label class="label" for="type">Type</label>
                        <div id="type-checkboxes" class="checkbox-group">
                            <div class="checkbox1">
                            <input type="checkbox" id="mainDish" name="type" value="mainDish">
                            <label class="check-label" for="mainDish">Main Dish</label>
                    
                            <input type="checkbox" id="sideDish" name="type" value="sideDish">
                            <label class="check-label" for="sideDish">Side Dish</label>
                    
                            <input type="checkbox" id="breakfast" name="type" value="breakfast">
                            <label class="check-label" for="breakfast">Breakfast</label>
                            </div>
                            <div class="checkbox2">
                            <input type="checkbox" id="lunch" name="type" value="lunch">
                            <label class="check-label" for="lunch">Lunch</label>
                    
                            <input type="checkbox" id="dinner" name="type" value="dinner">
                            <label class="check-label" for="dinner">Dinner</label>
                    
                            <input type="checkbox" id="dessert" name="type" value="dessert">
                            <label class="check-label" for="dessert">Dessert</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <label class="label" for="ingredients">Ingredients</label>
                        <input id="ingredients" class="input" type="text" name="ingredient" placeholder="Add ingredients">
                    </div>
                    <div class="row">
                        <label class="label" for="method">Method</label>
                        <textarea id="method" class="input" rows="5" cols="5" name="method" placeholder="Describe cooking method"></textarea>
                    </div>
                    <div class="row">
                        <input id="submitBtn" class="submit-button" type="button" value="Share">
                    </div>
                </form>
            </div>
            <div class="column col-2">
                <div id="search-section">
                    <h3>Recipes List</h3>
                    <label class="label" for="search-box">Search</label>
                    <input class="input" type="text" id="search-box" placeholder="Enter Resipe Name">
                </div>
                <div id="recipe-list"></div>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
    <script src="script2.js"></script>
</body>
<footer>
</footer>
</html>
